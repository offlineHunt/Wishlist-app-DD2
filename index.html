<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Вишлист</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <button id="profileBtn" class="profile-btn" title="Профиль">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>
        <div class="header-center">
            <h1 class="title">Вишлист</h1>
            <div id="currentUser" class="username">Не авторизован</div>
        </div>
        <div class="header-right">
            <!-- Кнопка выхода скрыта, так как выход осуществляется через кнопку профиля -->
        </div>
    </header>

    <main class="main-content">
        <!-- Главная страница -->
        <div id="homePage" class="page active">
            <h2 class="section-title">Категории</h2>
            <div class="categories-container">
                <div id="categoriesList" class="categories-list"></div>
                <button id="addCategoryBtn" class="add-category-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Страница категории -->
        <div id="categoryPage" class="page">
            <button id="backBtn" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Назад
            </button>
            <div class="category-header">
                <h2 id="categoryTitle" class="category-title">Категория</h2>
                <div id="categoryTotal" class="category-total">Общая сумма: 0 ₽</div>
            </div>
            <div class="category-actions">
                <button id="addSubgroupBtn" class="action-btn secondary">Добавить подгруппу</button>
                <button id="addItemDirectBtn" class="action-btn secondary">Добавить вещь</button>
            </div>
            <div id="subgroupsList" class="subgroups-list"></div>
        </div>
    </main>

    <!-- Модальное окно Авторизации -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="authModalTitle">Вход</h3>
                <button class="modal-close" data-modal="authModal">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Форма Входа -->
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" placeholder="Минимум 6 символов" required minlength="6">
                    </div>
                    <div id="loginError" class="error-message"></div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary btn-full">Войти</button>
                    </div>
                    <div class="auth-switch">
                        Нет аккаунта? <button type="button" id="showRegister" class="link-btn">Зарегистрироваться</button>
                    </div>
                </form>

                <!-- Форма Регистрации (скрыта по умолчанию) -->
                <form id="registerForm" class="hidden">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="registerPassword" placeholder="Минимум 6 символов" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Подтвердите пароль</label>
                        <input type="password" id="registerPasswordConfirm" placeholder="Повторите пароль" required minlength="6">
                    </div>
                    <div id="registerError" class="error-message"></div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary btn-full">Зарегистрироваться</button>
                    </div>
                    <div class="auth-switch">
                        Уже есть аккаунт? <button type="button" id="showLogin" class="link-btn">Войти</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Модальное окно Категории -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="categoryModalTitle">Новая категория</h3>
                <button class="modal-close" data-modal="categoryModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="categoryForm">
                    <input type="hidden" id="categoryId">
                    <div class="form-group">
                        <label>Название категории</label>
                        <input type="text" id="categoryNameInput" required>
                    </div>
                    <div id="categoryError" class="error-message"></div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" data-modal="categoryModal">Отмена</button>
                        <button type="submit" class="btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Модальное окно Подгруппы -->
    <div id="subgroupModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="subgroupModalTitle">Новая подгруппа</h3>
                <button class="modal-close" data-modal="subgroupModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="subgroupForm">
                    <input type="hidden" id="subgroupId">
                    <div class="form-group">
                        <label>Название подгруппы</label>
                        <input type="text" id="subgroupNameInput" required>
                    </div>
                    <div id="subgroupError" class="error-message"></div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" data-modal="subgroupModal">Отмена</button>
                        <button type="submit" class="btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Модальное окно Вещи -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="itemModalTitle">Новая вещь</h3>
                <button class="modal-close" data-modal="itemModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="itemForm">
                    <input type="hidden" id="itemId">
                    <input type="hidden" id="itemSubgroupId">
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="itemNameInput" required>
                    </div>
                    <div class="form-group">
                        <label>Цена (₽)</label>
                        <input type="number" id="itemPriceInput" min="0" step="0.01" required>
                    </div>
                    <div id="itemError" class="error-message"></div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" data-modal="itemModal">Отмена</button>
                        <button type="submit" class="btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Модальное окно Подтверждения -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Подтверждение</h3>
                <button class="modal-close" data-modal="confirmModal">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">Вы уверены?</p>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" data-modal="confirmModal">Отмена</button>
                    <button type="button" id="confirmBtn" class="btn-danger">Удалить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно Удаления подгруппы -->
    <div id="deleteSubgroupModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Удаление подгруппы</h3>
                <button class="modal-close" data-modal="deleteSubgroupModal">&times;</button>
            </div>
            <div class="modal-body">
                <p>В подгруппе есть вещи. Что сделать с ними?</p>
                <div class="form-actions vertical">
                    <button type="button" id="moveItemsBtn" class="btn-secondary">Перенести в "Общее"</button>
                    <button type="button" id="deleteItemsBtn" class="btn-danger">Удалить вместе с подгруппой</button>
                    <button type="button" class="btn-secondary" data-modal="deleteSubgroupModal" style="margin-top:10px">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">© Karabanev.D <span id="currentYear"></span></footer>
    <div id="notification" class="notification"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
